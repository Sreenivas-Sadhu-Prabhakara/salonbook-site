<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SalonBook — your chair, always booked. A KARYA studio build.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BE185D"/>
      <stop offset="1" stop-color="#7A1043"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffe3ef"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- soft decorative rings -->
  <circle cx="1050" cy="120" r="230" fill="#ffffff" opacity="0.06"/>
  <circle cx="1140" cy="560" r="150" fill="#ffffff" opacity="0.05"/>

  <!-- KARYA wordmark (top) -->
  <text x="90" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="8" fill="#ffd9e8" font-weight="700">K A R Y A</text>
  <text x="90" y="146" font-family="Helvetica, Arial, sans-serif" font-size="20" letter-spacing="2" fill="#ffb7d3" opacity="0.9">studio build · On the Bench</text>

  <!-- appointment-book mark -->
  <g transform="translate(90,210)" stroke="#ffffff" stroke-width="6" fill="none">
    <rect x="0" y="8" width="86" height="74" rx="12"/>
    <path d="M0 30h86"/>
    <path d="M22 0v20M64 0v20" stroke-linecap="round"/>
    <circle cx="60" cy="58" r="9" fill="#ffffff" stroke="none"/>
  </g>

  <!-- Product name -->
  <text x="200" y="290" font-family="Helvetica, Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-2" fill="#ffffff">SalonBook</text>

  <!-- Tagline (large) -->
  <text x="90" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="url(#ink)">Your chair, always booked.</text>

  <!-- sub-line -->
  <text x="90" y="478" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#ffe3ef" opacity="0.95">Salon booking &amp; rebooking reminders for salons &amp; spas in India</text>

  <!-- pill row -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#7A1043" font-weight="700">
    <rect x="90" y="520" width="290" height="60" rx="30" fill="#ffffff"/>
    <text x="118" y="559">Rebooking cadence</text>
    <rect x="402" y="520" width="272" height="60" rx="30" fill="#ffffff" opacity="0.92"/>
    <text x="430" y="559">Package balances</text>
    <rect x="696" y="520" width="222" height="60" rx="30" fill="#ffffff" opacity="0.85"/>
    <text x="724" y="559">No-show flags</text>
  </g>
</svg>
